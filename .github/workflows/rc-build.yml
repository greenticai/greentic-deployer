name: RC Build

# Builds the greentic-deployer binary as a release candidate for the
# stable-e2e-gate. Dispatched by stable-rc-build.yml against a
# release/v{X.Y.Z} branch.
#
# Note: the gtpack-publish step (push fixture gtpacks to GHCR) from
# release.yml is not run here — RCs are throwaway artifacts and don't
# need OCI publishing. If a future demo needs the deployer fixture
# packs, build them in a side job here and attach via extra-files.

on:
  workflow_call:
    inputs:
      ref:
        description: "Release branch to build from (e.g. release/v0.4.59)"
        required: true
        type: string
      tag:
        description: "RC tag to create (e.g. v0.4.59-rc.{run_id})"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Release branch to build from (e.g. release/v0.4.59)"
        required: true
        type: string
      tag:
        description: "RC tag to create (e.g. v0.4.59-rc.{run_id})"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    uses: greenticai/.github/.github/workflows/release-binaries-rc.yml@main
    with:
      package: greentic-deployer
      binary: greentic-deployer
      ref: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}
    secrets: inherit
