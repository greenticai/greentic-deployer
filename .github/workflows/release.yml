name: Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types:
      - completed
  workflow_dispatch:

jobs:
  crate-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_output=$(cargo publish --locked 2>&1) || status=$?
          echo "$publish_output"
          if [ "${status:-0}" -ne 0 ]; then
            if echo "$publish_output" | grep -qi "already uploaded"; then
              echo "Version already published; skipping error."
              exit 0
            fi
            if echo "$publish_output" | grep -qi "already exists on crates.io index"; then
              echo "Crate version already on crates.io; skipping publish error."
              exit 0
            fi
            exit ${status:-1}
          fi

  gtpack-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: oras-project/setup-oras@v1
      - name: Build fixture gtpacks
        run: cargo run --bin build_fixture_gtpacks
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish gtpacks to GHCR
        env:
          GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}/packs/deployer
          REVISION: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          pack_paths=(dist/*.gtpack)
          if [ "${#pack_paths[@]}" -eq 0 ]; then
            echo "No .gtpack files found in dist/"
            exit 1
          fi

          for pack_path in "${pack_paths[@]}"; do
            pack_file="$(basename "$pack_path")"
            pack_name="${pack_file%.gtpack}"
            ref="${GHCR_NAMESPACE}/${pack_file}:latest"

            echo "Publishing ${pack_file} -> ${ref}"
            oras push "${ref}" \
              --artifact-type application/vnd.greentic.gtpack.v1 \
              --annotation "org.opencontainers.image.title=${pack_file}" \
              --annotation "org.opencontainers.image.revision=${REVISION}" \
              "${pack_path}:application/vnd.greentic.gtpack.layer.v1+tar"
          done
