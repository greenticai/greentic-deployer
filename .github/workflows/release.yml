name: CI and Publish

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  local-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: ./ci/local_check.sh

  binary-release-assets:
    name: Build binary release assets
    runs-on: ${{ matrix.os }}
    needs: local-check
    permissions:
      contents: write
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            asset_suffix: linux-arm64
            binary_name: greentic-deployer
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            asset_suffix: windows-arm64
            binary_name: greentic-deployer.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          targets: ${{ matrix.target }}
      - name: Install Linux ARM cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Linux ARM asset
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        env:
          ASSET_BASENAME: greentic-deployer-${{ github.ref_name }}-${{ matrix.asset_suffix }}
        run: |
          set -euo pipefail
          mkdir "$ASSET_BASENAME"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$ASSET_BASENAME/"
          tar -czf "${ASSET_BASENAME}.tar.gz" "$ASSET_BASENAME"
      - name: Package Windows ARM asset
        if: matrix.archive_ext == 'zip'
        shell: bash
        env:
          ASSET_BASENAME: greentic-deployer-${{ github.ref_name }}-${{ matrix.asset_suffix }}
        run: |
          set -euo pipefail
          mkdir "$ASSET_BASENAME"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$ASSET_BASENAME/"
          powershell -NoLogo -NoProfile -Command "Compress-Archive -Path '$env:ASSET_BASENAME' -DestinationPath '$env:ASSET_BASENAME.zip'"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: greentic-deployer-${{ github.ref_name }}-${{ matrix.asset_suffix }}
          path: greentic-deployer-${{ github.ref_name }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}

  crate-publish:
    runs-on: ubuntu-latest
    needs: local-check
    permissions:
      contents: read
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_output=$(cargo publish --locked 2>&1) || status=$?
          echo "$publish_output"
          if [ "${status:-0}" -ne 0 ]; then
            if echo "$publish_output" | grep -qi "already uploaded"; then
              echo "Version already published; skipping error."
              exit 0
            fi
            if echo "$publish_output" | grep -qi "already exists on crates.io index"; then
              echo "Crate version already on crates.io; skipping publish error."
              exit 0
            fi
            exit ${status:-1}
          fi

  gtpack-publish:
    runs-on: ubuntu-latest
    needs: local-check
    permissions:
      contents: read
      packages: write
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: oras-project/setup-oras@v1
      - name: Build fixture gtpacks
        id: build-gtpacks
        run: |
          set -euo pipefail
          cargo run --bin build_fixture_gtpacks | tee /tmp/build_fixture_gtpacks.log
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish gtpacks to GHCR
        env:
          GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}/packs/deployer
          REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          mapfile -t pack_lines < <(grep $'^PACK\t' /tmp/build_fixture_gtpacks.log || true)
          if [ "${#pack_lines[@]}" -eq 0 ]; then
            echo "No PACK metadata found in build output"
            exit 1
          fi

          for pack_line in "${pack_lines[@]}"; do
            IFS=$'\t' read -r _ pack_id pack_version pack_path <<<"${pack_line}"
            pack_file="$(basename "$pack_path")"
            version_ref="${GHCR_NAMESPACE}/${pack_id}:${pack_version}"
            latest_ref="${GHCR_NAMESPACE}/${pack_id}:latest"

            echo "Publishing ${pack_file} -> ${version_ref}"
            oras push "${version_ref}" \
              --artifact-type application/vnd.greentic.gtpack.v1 \
              --annotation "org.opencontainers.image.title=${pack_file}" \
              --annotation "org.opencontainers.image.revision=${REVISION}" \
              "${pack_path}:application/vnd.greentic.gtpack.layer.v1+tar"

            echo "Publishing ${pack_file} -> ${latest_ref}"
            oras push "${latest_ref}" \
              --artifact-type application/vnd.greentic.gtpack.v1 \
              --annotation "org.opencontainers.image.title=${pack_file}" \
              --annotation "org.opencontainers.image.revision=${REVISION}" \
              "${pack_path}:application/vnd.greentic.gtpack.layer.v1+tar"
          done
