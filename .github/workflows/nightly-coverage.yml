name: Nightly Coverage

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "0"

    steps:
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android \
            /usr/local/share/boost 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install coverage toolchain
        run: |
          # rust-cache restores ~/.cargo/.crates.toml but not ~/.cargo/bin,
          # so binstall may say "already installed" while the binary is gone.
          if ! command -v cargo-llvm-cov >/dev/null; then
            cargo binstall -y --force cargo-llvm-cov
          fi
          if ! command -v cargo-nextest >/dev/null; then
            cargo binstall -y --force cargo-nextest
          fi
          command -v cargo-llvm-cov
          command -v cargo-nextest

      - name: Install greentic-dev
        run: |
          cargo binstall -y --force greentic-dev
          command -v greentic-dev
          greentic-dev --version

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Disk before coverage
        run: df -h /

      - name: Validate coverage policy
        run: |
          greentic-dev coverage

      - name: Disk after coverage
        if: always()
        run: df -h /

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-report
          path: target/coverage/coverage.json
          if-no-files-found: ignore
