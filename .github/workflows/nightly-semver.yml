name: Nightly Semver Advisory

# Advisory-mode cargo-semver-checks moved off pull_request onto a nightly
# schedule. See plans/binary-bifurcation.md Phase A. The real semver gate
# remains at weekly-stable-prepare on main; this is the compass, not the gate.

on:
  schedule:
    # 06:35 UTC — staggered to avoid hot-spots.
    - cron: "35 6 * * *"
  workflow_dispatch:
    inputs:
      baseline-rev:
        description: "Optional explicit baseline git ref (default: latest vX.Y.Z tag)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: nightly-semver-${{ github.ref }}
  cancel-in-progress: false

jobs:
  advisory:
    uses: greenticai/.github/.github/workflows/nightly-semver-advisory.yml@main
    with:
      semver-baseline-rev: ${{ inputs.baseline-rev || '' }}
