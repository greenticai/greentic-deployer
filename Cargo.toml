[package]
name = "greentic-deployer"
version = "0.5.9"
edition = "2024"
rust-version = "1.95"
description = "Greentic deployer runtime for plan construction and deployment-pack dispatch"
license = "MIT"
readme = "README.md"
repository = "https://github.com/greenticai/greentic-deployer"
homepage = "https://github.com/greenticai/greentic-deployer"
documentation = "https://docs.greentic.ai/deployer"
keywords = ["greentic", "deployer", "deployment-pack", "runner"]
categories = ["development-tools"]

[features]
default = ["bundle-upload-aws"]
internal-tools = []
test-utils = []
bundle-upload-aws = ["dep:aws-sdk-s3", "dep:aws-config", "dep:aws-smithy-runtime-api"]
bundle-upload-gcp = []
bundle-upload-azure = []

[[bin]]
name = "greentic-deployer"
path = "src/main.rs"

[[bin]]
name = "build_fixture_gtpacks"
path = "src/bin/build_fixture_gtpacks.rs"
required-features = ["internal-tools"]

[[bin]]
name = "replay_deployer_scaffolds"
path = "src/bin/replay_deployer_scaffolds.rs"
required-features = ["internal-tools"]

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
greentic-telemetry = { version = "0.5", features = ["otlp"] }
greentic-types = { version = "0.5" }
greentic-distributor-client = { version = "0.5" }
greentic-config = "0.5"
greentic-config-types = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_bw = {package="serde_yaml_gtc", version="2.5.2"}
semver = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs", "io-util"] }
aws-sdk-s3 = { version = "1", optional = true, default-features = false, features = ["rustls", "rt-tokio"] }
aws-config = { version = "1", optional = true, default-features = false, features = ["rustls", "rt-tokio"] }
aws-smithy-runtime-api = { version = "1", optional = true }
sha2 = "0.10"
hex = "0.4"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
url = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
tar = "0.4"
zip = { version = "8", default-features = false, features = ["deflate"] }
once_cell = "1"
reqwest = { version = "0.13", features = ["blocking", "json", "rustls"] }
toml = "1"
indexmap = "2"
jsonschema = "0.46"

[dev-dependencies]
tempfile = "3"
wat = "1"
