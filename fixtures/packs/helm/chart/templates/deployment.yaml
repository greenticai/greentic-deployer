apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "greentic-operator.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "greentic-operator.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "greentic-operator.name" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          env:
            - name: REDIS_URL
              value: {{ .Values.redis.externalUrl | quote }}
            - name: GREENTIC_BUNDLE_SOURCE
              value: {{ .Values.bundle.source | quote }}
            - name: GREENTIC_ADMIN_LISTEN
              value: {{ .Values.adminApi.listener | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080

